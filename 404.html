<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<title>Page Not Found | Robert Lynn Holdings</title>
<meta name="robots" content="noindex" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Spectral:wght@300;400;500;600;700&family=Hanken+Grotesk:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  :root{
    --ink:#0C2229;--deep:#103039;--teal:#1F5A66;--brass:#C2913E;--brass-deep:#A6792E;
    --paper:#F4F3EE;--mist:#DCE5E4;--line-light:rgba(244,243,238,.18);
    --serif:"Spectral",Georgia,serif;--sans:"Hanken Grotesk",system-ui,-apple-system,sans-serif;--mono:"IBM Plex Mono",ui-monospace,monospace;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{
    font-family:var(--sans);color:var(--paper);line-height:1.6;-webkit-font-smoothing:antialiased;
    min-height:100vh;display:flex;flex-direction:column;
    background:
      radial-gradient(1100px 500px at 78% -10%, rgba(31,90,102,.55), transparent 60%),
      linear-gradient(180deg,#0C2229 0%, #0E2730 55%, #103039 100%);
  }
  a{color:inherit;text-decoration:none;}
  img{display:block;max-width:100%;}
  .top{max-width:1180px;width:100%;margin:0 auto;padding:22px 28px;}
  .top .logo-img{height:46px;width:auto;}
  main{
    flex:1;max-width:1180px;width:100%;margin:0 auto;padding:40px 28px 90px;
    display:flex;flex-direction:column;justify-content:center;
  }
  .eyebrow{
    font-family:var(--mono);font-size:.72rem;letter-spacing:.22em;text-transform:uppercase;
    color:var(--brass);display:inline-flex;align-items:center;gap:.7em;margin-bottom:1rem;
  }
  .eyebrow::before{content:"";width:26px;height:1px;background:var(--brass);display:inline-block;}
  .code{
    font-family:var(--mono);font-size:.8rem;letter-spacing:.2em;color:var(--mist);opacity:.7;margin-bottom:.6rem;
  }
  h1{
    font-family:var(--serif);font-weight:600;font-size:clamp(2.4rem,5.5vw,4rem);
    line-height:1.05;letter-spacing:-.01em;margin-bottom:1rem;max-width:16ch;
  }
  h1 em{font-style:italic;color:var(--brass);font-weight:500;}
  p.lead{font-size:1.13rem;color:#D7E0DF;max-width:46ch;margin-bottom:2rem;}
  .btns{display:flex;gap:14px;flex-wrap:wrap;margin-bottom:2.6rem;}
  .btn{
    font-family:var(--sans);font-weight:600;font-size:.95rem;padding:.85em 1.5em;border-radius:2px;
    display:inline-flex;align-items:center;gap:.55em;border:1px solid transparent;transition:transform .18s ease,background .18s ease,color .18s ease,border-color .18s ease;
  }
  .btn .arr{transition:transform .18s ease;}
  .btn:hover .arr{transform:translateX(3px);}
  .btn-primary{background:var(--brass);color:var(--ink);}
  .btn-primary:hover{background:#d4a350;transform:translateY(-1px);}
  .btn-ghost{background:transparent;border-color:var(--line-light);color:var(--paper);}
  .btn-ghost:hover{border-color:var(--brass);color:var(--brass);}
  .links{
    border-top:1px solid var(--line-light);padding-top:1.4rem;
    display:flex;gap:26px;flex-wrap:wrap;font-family:var(--mono);font-size:.72rem;
    letter-spacing:.12em;text-transform:uppercase;
  }
  .links a{color:var(--mist);opacity:.85;transition:color .15s ease,opacity .15s ease;}
  .links a:hover{color:var(--brass);opacity:1;}
</style>
</head>
<body>
  <div class="top">
    <a href="/" aria-label="Robert Lynn Holdings home">
      <img class="logo-img" src="/images/logo-light.png" alt="Robert Lynn Holdings" />
    </a>
  </div>
  <main>
    <div class="code">Error 404</div>
    <span class="eyebrow">Page not found</span>
    <h1>This page took a <em>wrong turn.</em></h1>
    <p class="lead">The page you're looking for isn't here — it may have moved or the link may be out of date. Let's get you back on track.</p>
    <div class="btns">
      <a class="btn btn-primary" href="/">Back to home <span class="arr">&rarr;</span></a>
      <a class="btn btn-ghost" href="/pages/contact">Contact us</a>
    </div>
    <nav class="links">
      <a href="/pages/about">About</a>
      <a href="/pages/services">Services</a>
      <a href="/pages/properties">Properties</a>
      <a href="/pages/leasing">Available Space</a>
      <a href="/pages/contact">Contact</a>
    </nav>
  </main>
</body>
</html>
